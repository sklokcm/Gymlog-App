<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gymlog App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        
        <section id="home-screen" class="screen active">
            <h1>Gymlog</h1>
            <p>Ready to break your own records?</p>
            <div class="button-group">
                <button id="start-workout-btn" class="primary-btn">Begin workout</button>
                <button id="library-btn" class="primary-btn">Library</button>
                <button id="statistics-btn" class="primary-btn">Statictics</button> 
                <button id="history-btn" class="primary-btn">History</button> 
            </div>   
        </section>

        <section id="workout-screen" class="screen hidden">
            <h2>Training continues... 🔴</h2>
            <div id="active-workout-timer" style="font-size: 2.5rem; font-weight: bold; text-align: center; margin-bottom: 20px; color: #007bff; font-family: monospace;">
                00:00:00
            </div>
            <div id="exercises-container">

            </div>
            <div class="add-exercise-pannel">
                <button id="add-exercise-btn" class="primary-btn">Add Exercise</button>
                <input type="text" id="exercises-search" class="primary-btn" list="exercise-datalist" placeholder="Searrch for an exercise">
                <datalist id="exercise-datalist"></datalist>
            </div>

            <button id="finish-workout-btn" class="danger-btn">Log Workout</button>
        </section>


        <section id="library-screen" class="screen hidden"> 
            <h2>Placeholder</h2>
            <button class="danger-btn exit">Exit</button>
        </section>


        <section id="statistics-screen" class="screen hidden">
            <h2>Stats are going to be here soon</h2>

            <button class="danger-btn exit">Exit</button>
        </section>

        <section id="history-screen" class="screen hidden">
            <h2>Workout history</h2>
              
            <div id="history-list"> 

                <div class="history-card">

                    <div class="history-header">
                        <span class="history-date">April 6th, 14:30</span>
                    </div>
                    <div class="history-body">
                        <p><strong>Volume:</strong> 10.875kg</p>
                        <p><strong>Sets:</strong> 21</p>
                        <p><strong>Duration:</strong> 1h 14min</p>
                    </div>

                    <button class="secondary-btn view-details-btn">View Details</button>
                </div>
                
                
            </div>

            <button class="danger-btn exit">Exit</button>
        </section>

    </div>

    <script type="importmap">
        {
            "imports": {
                "gymlog-core": "./node_modules/gymlog-core/index.js"
            }
        }
    </script>

    <script type="module" src="main.js"></script>
</body>
</html>
